<style type="text/css">
  :root {
    --teal: #3bb2bd;
    --teal-dark: #2a9eaa;
    --black: #000000;
    --gray: #8c8c8c;
    --light-teal: #eefafb;
    --border: #e8eaed;
    --white: #ffffff;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "dbheavent_cond", sans-serif;
    background: var(--white);
    color: var(--black);
    line-height: 1.4;
  }

  .page-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  .timeline-header {
    text-align: center;
    margin-bottom: 48px;
  }

  .timeline-header h2 {
    font-size: 50px;
    font-weight: 600;
    color: var(--teal);
    margin-bottom: 8px;
    line-height: 1;
  }

  .timeline-header p {
    font-size: 26px;
    color: var(--gray);
  }

  .timeline-wrapper {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }

  .timeline-wrapper::before {
    content: "";
    position: absolute;
    left: calc(50% - 1px);
    top: 17px;
    bottom: auto;
    height: var(--line-height, 100%);
    width: 2px;
    background: var(--teal);
  }

  .timeline-item:last-child {
    margin-bottom: 0;
  }

  .timeline-item {
    display: flex;
    justify-content: flex-end;
    padding-right: calc(50% + 50px);
    margin-bottom: -60px;
    position: relative;
  }

  .timeline-item.right {
    justify-content: flex-start;
    padding-right: 0;
    padding-left: calc(50% + 50px);
  }

  .timeline-item::before {
    content: "";
    position: absolute;
    left: 50%;
    top: 10px;
    width: 14px;
    height: 14px;
    background: var(--teal);
    border-radius: 50%;
    transform: translateX(-50%);
    z-index: 1;
    box-shadow: 0 0 0 4px rgba(59, 178, 189, 0.2);
  }

  .timeline-item::after {
    content: "";
    position: absolute;
    top: 16px;
    right: calc(50% + 7px);
    width: 43px;
    height: 2px;
    background: var(--teal);
  }

  .timeline-item.right::after {
    right: auto;
    left: calc(50% + 7px);
  }

  .timeline-content {
    width: 400px;
    min-height: auto;
    position: relative;
    z-index: 10;
  }

  .timeline-date {
    font-size: 30px;
    font-weight: 600;
    color: var(--teal);
    margin-bottom: 0px;
    line-height: 1.1;
  }

  .timeline-item:not(.right) .timeline-date,
  .timeline-item:not(.right) .timeline-title,
  .timeline-item:not(.right) .timeline-desc,
  .timeline-item:not(.right) .timeline-link,
  .timeline-item:not(.right) .timeline-content {
    text-align: right;
  }

  .timeline-item.right .timeline-date,
  .timeline-item.right .timeline-title,
  .timeline-item.right .timeline-desc,
  .timeline-item.right .timeline-link,
  .timeline-item.right .timeline-content {
    text-align: left;
  }

  .timeline-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--gray);
    margin-bottom: 2px;
    line-height: 1.2;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .timeline-desc {
    font-size: 24px;
    color: var(--gray);
    line-height: 1.2;
    margin-bottom: 4px;
    word-break: break-word;
    overflow-wrap: break-word;
  }

  .timeline-link {
    font-size: 24px;
    color: #3cbfcd !important;
    text-decoration: underline;
    font-weight: 400;
  }

  @media (max-width: 700px) {
    .timeline-wrapper::before {
      left: 19px;
    }
    .timeline-item::after,
    .timeline-item.right::after {
      right: auto;
      left: 26px;
      width: 34px;
    }
    .timeline-item,
    .timeline-item.right {
      justify-content: flex-start;
      padding-left: 60px;
      padding-right: 0;
    }
    .timeline-item::before {
      left: 20px;
    }
    .timeline-item:not(.right) .timeline-date,
    .timeline-item:not(.right) .timeline-content {
      text-align: left;
    }
    .timeline-content {
      max-width: 100%;
    }
  }
</style>

    },

  function renderTimeline() {
    const wrapper = document.getElementById("dynamic-timeline");
    if (!wrapper) return;

    const sortedData = timelineData.sort((a, b) => b.no - a.no);

    let html = "";
    sortedData.forEach((item, index) => {
      const alignmentClass = index % 2 === 0 ? "right" : "";

      html += `
        <div class="timeline-item ${alignmentClass}">
          <div class="timeline-content">
            <div class="timeline-date">${item.date}</div>
            <div class="timeline-title">${item.title}</div>
            <div class="timeline-desc">${item.desc}</div>
            <a class="timeline-link" href="${item.link}" target="_blank">คลิกเพื่อดูเพิ่มเติม</a>
          </div>
        </div>
      `;
    });

    wrapper.innerHTML = html;
    calculateLineHeight();
  }

  function calculateLineHeight() {
    const wrapper = document.getElementById("dynamic-timeline");
    const items = wrapper.querySelectorAll(".timeline-item");

    if (items.length > 0) {
      const lastItem = items[items.length - 1];
      const finalHeight = lastItem.offsetTop;
      wrapper.style.setProperty("--line-height", `${finalHeight}px`);
    }
  }

  window.addEventListener("DOMContentLoaded", renderTimeline);
  window.addEventListener("resize", calculateLineHeight);
</script>

<!-- PAGE CONTENT -->
<main class="page-wrapper">

      </div>

      <div class="timeline-wrapper" id="dynamic-timeline">
        <!-- JS จะถูกแทรกข้อมูลตรงนี้ -->
      </div>
    </section>
  </div>
</main>
